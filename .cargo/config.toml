[alias]
xcheck  = "xwin check"
xbuild  = "xwin build"
xclippy = "xwin clippy"
xtest   = "xwin test"
xrun    = "xwin run"
b       = "xbuild"
c       = "xcheck"
t       = "xtest"
r       = "xrun"

[build]
target = "x86_64-pc-windows-msvc"

[profile.release]
panic = "immediate-abort"

[unstable]
panic-immediate-abort = true
build-std             = ["std", "panic_abort"]
build-std-features    = ["optimize_for_size"]
